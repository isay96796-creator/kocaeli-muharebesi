<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kocaeli Muharebesi: Final</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #222; font-family: 'Segoe UI', sans-serif; touch-action: none; cursor: url('cursor1.png') 0 0, auto; }
        body.clicking { cursor: url('cursor2.png') 0 0, auto; }
        canvas { display: block; cursor: inherit; }
        
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .hud-item { position: absolute; background: rgba(0, 0, 0, 0.5); color: white; padding: 10px 20px; border-radius: 20px; font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 10px; pointer-events: auto; cursor: inherit; }
        
        /* FIXED: Capacity Icon Size */
        .hud-icon { width: 40px; height: 40px; object-fit: contain; display: block; }
        
        #money-counter { top: 20px; left: 20px; color: #ffd700; }
        #capacity-counter { top: 20px; right: 20px; color: #fff; }
        #fullscreen-btn { position: absolute; bottom: 30px; left: 30px; background: #2196F3; color: white; padding: 10px 20px; border-radius: 20px; font-size: 24px; font-weight: bold; border: 2px solid #fff; cursor: pointer; pointer-events: auto; z-index: 300; }
        #nalbur-btn { bottom: 30px; right: 30px; background: #ff9800; color: white; cursor: pointer; border: 2px solid #fff; }
        
        #loading-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #333; display: flex; justify-content: center; align-items: center; color: white; font-size: 24px; z-index: 200; flex-direction: column; cursor: wait; }
        .progress-bar { width: 300px; height: 20px; background: #555; margin-top: 20px; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #4CAF50; transition: width 0.2s; }
        
        /* MAIN MENU STYLES */
        #main-menu { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: url('background.jpg'); background-size: cover; background-position: center;
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 150; color: white; pointer-events: auto; 
        }
        #main-menu::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: -1; }
        
        /* TITLE & BUTTONS */
        #menu-center { display: flex; flex-direction: column; align-items: center; margin-bottom: 150px; z-index: 10; }
        #main-menu h1 { font-size: 80px; margin: 0; color: #4CAF50; text-shadow: 4px 4px 0 #000; }
        #main-menu h3 { font-size: 28px; margin-bottom: 40px; color: #aaa; font-weight: normal; }
        .menu-btn { padding: 15px 40px; font-size: 28px; font-weight: bold; background: white; color: #333; border: none; border-radius: 50px; cursor: pointer; margin: 10px; transition: transform 0.1s; width: 300px; }
        .menu-btn:hover { transform: scale(1.05); background: #f0f0f0; }

        /* CHARACTERS ON MENU */
        #menu-left { position: absolute; top: 50%; left: 30px; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; align-items: center; z-index: 5; }
        #menu-left img { filter: drop-shadow(5px 5px 5px #000); transition: transform 0.3s; }
        #menu-left img:hover { transform: scale(1.1); }

        #menu-right-container { position: absolute; top: 50%; right: 30px; transform: translateY(-50%); display: flex; gap: 20px; z-index: 5; }
        .menu-col { display: flex; flex-direction: column; gap: 10px; align-items: center; justify-content: center; }
        .menu-col img { filter: drop-shadow(5px 5px 5px #000); transition: transform 0.3s; }
        .menu-col img:hover { transform: scale(1.1); }

        #menu-bottom { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; align-items: flex-end; z-index: 5; }
        #menu-bottom img { filter: drop-shadow(5px 5px 5px #000); transition: transform 0.3s; }
        #menu-bottom img:hover { transform: translateY(-10px); }

        /* HOW TO PLAY MODAL (SLIDER STYLE) */
        #how-to-play { 
            display: none; 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; height: 85%;
            background: rgba(0, 0, 0, 0.95);
            border: 4px solid #4CAF50; border-radius: 20px;
            z-index: 500; 
            flex-direction: row; align-items: center; justify-content: space-between;
            padding: 20px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            color: white;
        }
        #htp-close { position: absolute; top: 15px; right: 25px; font-size: 40px; cursor: pointer; color: #fff; z-index: 501; }
        #htp-close:hover { color: #ff4444; }
        
        .nav-arrow { font-size: 60px; cursor: pointer; padding: 20px; user-select: none; color: #888; transition: 0.2s; z-index: 502; }
        .nav-arrow:hover { color: #fff; transform: scale(1.2); }

        #slide-content { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 100%; overflow: hidden;
        }
        /* Container for multiple images in slider */
        #slide-img-container {
            display: flex; gap: 20px; justify-content: center; align-items: flex-end;
            height: 300px; margin-bottom: 20px;
        }
        .slide-img-item { 
            height: 100%; width: auto; object-fit: contain; 
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2)); 
        }
        /* Special style for Boss Dog (Red & Big) */
        .boss-dog-style {
            filter: sepia(1) saturate(4) hue-rotate(-50deg) drop-shadow(0 0 20px red) !important;
            transform: scale(1.3);
        }

        #slide-title { font-size: 48px; color: #FFD700; margin-bottom: 15px; text-shadow: 2px 2px 0 #000; }
        
        /* Text styling for long descriptions */
        #slide-desc { 
            font-size: 20px; max-width: 900px; line-height: 1.6; color: #ddd; 
            white-space: pre-line; /* Handle new lines */
            text-align: left;
            max-height: 40vh; overflow-y: auto; /* Scroll if text is too long */
            padding: 0 20px;
        }
        /* Centered text for short descriptions */
        .text-center #slide-desc { text-align: center; }

        /* ALERTS */
        #boss-alert { position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%); font-size: 48px; font-weight: bold; color: #ff4444; text-shadow: 2px 2px 0 #000; display: none; animation: pulse 1s infinite; z-index: 20; text-align: center; width: 100%; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } 100% { transform: translate(-50%, -50%) scale(1); } }
        #pandemic-hud { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(200, 0, 0, 0.85); color: white; padding: 15px 25px; border-radius: 10px; font-size: 24px; font-weight: bold; display: none; text-align: center; border: 3px solid #fff; z-index: 15; box-shadow: 0 0 15px red; }
        
        #game-screen-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(180, 0, 0, 0.8); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; color: white; text-align: center; pointer-events: auto; backdrop-filter: blur(5px); transition: background 1s; }
        #overlay-title { font-size: 60px; text-shadow: 4px 4px 0 #000; margin-bottom: 40px; color: #ffdddd; }
        #restart-btn { padding: 20px 50px; font-size: 32px; font-weight: bold; background: white; color: #d32f2f; border: none; border-radius: 15px; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.5); pointer-events: auto; transition: transform 0.1s; }
        #restart-btn:hover { transform: scale(1.05); }
        
        #debug-log { font-size: 14px; color: #aaa; margin-top: 10px; font-family: monospace; text-align: center; padding: 10px; }
        #error-display { color: #ff5555; font-weight: bold; margin-top: 10px; max-width: 80%; word-wrap: break-word; background:rgba(0,0,0,0.8); padding:10px; border-radius:5px; display:none;}
        
        #upgrade-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 50; justify-content: center; align-items: center; pointer-events: auto; cursor: inherit; }
        .modal-content { background: white; padding: 30px; border-radius: 20px; width: 80%; max-width: 700px; text-align: center; position: relative; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); cursor: default; }
        .close-btn { position: absolute; top: 10px; right: 15px; font-size: 24px; cursor: pointer; color: #555; }
        .upgrade-grid { display: flex; justify-content: space-around; margin-top: 20px; gap: 20px; flex-wrap: wrap; }
        .upgrade-card { background: #f5f5f5; padding: 20px; border-radius: 15px; flex: 1; min-width: 120px; display: flex; flex-direction: column; align-items: center; cursor: pointer; border: 2px solid transparent; }
        .upgrade-card:hover { background: #e0e0e0; } .upgrade-card.disabled { opacity: 0.5; cursor: not-allowed; }
        .upgrade-icon { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
        .upgrade-price { background: #4CAF50; color: white; padding: 5px 15px; border-radius: 15px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <script>
        function showError(msg) {
            const el = document.getElementById('error-display');
            if (el) { el.style.display = 'block'; el.innerHTML += `<div>${msg}</div>`; }
            document.getElementById('loading-screen').style.display = 'none';
            console.error(msg);
        }

        window.onerror = function(message, source, lineno, colno, error) {
            showError(`Hata: ${message} (Satır: ${lineno})`);
        };

        function log(msg) { console.log(msg); const el = document.getElementById('debug-log'); if(el) el.innerText = msg; }

        const CONFIG = {
            WORLD_WIDTH: 2500, WORLD_HEIGHT: 2500, PLAYER_SPEED_BASE: 450, PLAYER_CAPACITY_BASE: 1,
            DOG_SPAWN_INTERVAL: 2000, MAX_DOGS: 30, ACTIVIST_COUNT: 5, ACTIVIST_SPEED: 100, ACTIVIST_STUN_DURATION: 2000, STACK_HEIGHT_OFFSET: 15,
            DEPOSIT_RATE: 100, UPGRADE_COST_SPEED: 50, UPGRADE_COST_CAPACITY: 100, UPGRADE_COST_CLEANER: 500, UPGRADE_COST_HELPER: 600, UPGRADE_COST_POLICE: 600,
            SAFE_ZONE_RADIUS: 400, BUILDING_BOUNDS: { x: 0, y: 0, w: 600, h: 600 },
            FOOD_EAT_TIME: 6000, CIVILIAN_EAT_TIME: 5000, HELPER_CAPACITY: 2,
            BOSS_DROPS_BASE: 30, BOSS_WAVE_DELAY: 120, CLEANER_SPEED_NORMAL: 80, CLEANER_SPEED_FAST: 400
        };

        // SOUND MANAGER CLASS
        class SoundManager {
            constructor() {
                this.bgm = null;
                this.currentTrackName = null;
                this.sounds = {};
            }

            loadSounds() {
                const soundFiles = [
                    'Mainmenu', 'gamestart1', 'gamestart2', 'intruder_vehiclewave1_1', 'intruder_vehiclewave1_2',
                    'intruder_vehiclewave2_1', 'intruder_vehiclewave2_2', 'bosswave1_1', 'bosswave1_2',
                    'bosswave2_1', 'bosswave2_2', 'bosswave3_1', 'vali', 'gameover'
                ];
                soundFiles.forEach(name => {
                    try {
                        this.sounds[name] = new Audio(`${name}.mp3`);
                        this.sounds[name].preload = 'auto';
                    } catch (e) {
                        console.warn("Ses dosyası yüklenemedi:", name);
                    }
                });
            }

            playMusicSequence(introName, loopName) {
                if (this.currentTrackName === introName) return;
                this.stopMusic();
                this.currentTrackName = introName;

                const intro = this.sounds[introName];
                const loop = this.sounds[loopName];

                if (intro) {
                    intro.currentTime = 0;
                    intro.volume = 0.5;
                    intro.loop = false;
                    
                    if (introName === 'gamestart1' && loopName === 'gamestart1') {
                        intro.loop = true;
                        intro.play().catch(e => console.warn("Audio play blocked", e));
                        this.bgm = intro;
                        return;
                    }

                    intro.play().catch(e => console.warn("Audio play blocked", e));
                    this.bgm = intro;

                    if (loop) {
                        intro.onended = () => {
                            loop.currentTime = 0;
                            loop.volume = 0.5;
                            loop.loop = true;
                            loop.play().catch(e => console.warn("Loop blocked", e));
                            this.bgm = loop;
                            this.currentTrackName = loopName;
                        };
                    }
                }
            }

            playLoop(name) {
                if (this.currentTrackName === name) return;
                this.stopMusic();
                this.currentTrackName = name;
                const snd = this.sounds[name];
                if (snd) {
                    snd.currentTime = 0;
                    snd.loop = true;
                    snd.volume = 0.5;
                    snd.play().catch(e => console.warn("Loop blocked", e));
                    this.bgm = snd;
                }
            }

            stopMusic() {
                if (this.bgm) {
                    this.bgm.pause();
                    this.bgm.currentTime = 0;
                    this.bgm.onended = null;
                    this.bgm = null;
                }
                this.currentTrackName = null;
            }
        }

        class AssetManager {
            constructor() {
                this.assets = {};
                this.toLoad = [
                    { name: 'background', src: 'background1.jpg' }, { name: 'player', src: 'player.png' }, { name: 'player1', src: 'player1.png' }, { name: 'playerhappy1', src: 'playerhappy1.png' }, { name: 'playerhappy2', src: 'playerhappy2.png' },
                    { name: 'vehicle', src: 'vehicle.png' }, 
                    { name: 'activist', src: 'activist.png' }, { name: 'activist2', src: 'activist2.png' }, { name: 'activist3', src: 'activist3.png' },
                    { name: 'dog1', src: 'dog1.png' }, { name: 'dog2', src: 'dog2.png' }, { name: 'dog3', src: 'dog3.png' },
                    { name: 'patient1', src: 'patient1.png' }, { name: 'Pation1happy1', src: 'Pation1happy1.png' }, { name: 'Pation1happy2', src: 'Pation1happy2.png' },
                    { name: 'patient2', src: 'patient2.png' }, { name: 'Pation2happy1', src: 'Pation2happy1.png' }, { name: 'Pation2happy2', src: 'Pation2happy2.png' },
                    { name: 'patient3', src: 'patient3.png' }, { name: 'Pation3happy1', src: 'Pation3happy1.png' }, { name: 'Pation3happy2', src: 'Pation3happy2.png' },
                    { name: 'boot', src: 'boot.png' }, { name: 'cage', src: 'cage.png' }, { name: 'dogfood', src: 'dogfood.png' },
                    { name: 'cleaner', src: 'cleaner.png' }, { name: 'cleanerhappy', src: 'cleanerhappy.png' },
                    { name: 'helper', src: 'helper.png' }, { name: 'helperhappy1', src: 'helperhappy1.png' }, { name: 'helperhappy2', src: 'helperhappy2.png' },
                    { name: 'police', src: 'police.png' }, { name: 'policehappy', src: 'policehappy.png' },
                    { name: 'boss1', src: 'boss1.png' }, { name: 'boss2', src: 'boss2.png' },
                    { name: 'intruder_move', src: 'intruder_vehicle.png' }, { name: 'intruder_stop', src: 'intruder_vehicle1.png' },
                    { name: 'vali', src: 'vali.png' }, { name: 'vali1', src: 'vali1.png' }, { name: 'valihappy', src: 'valihappy.png' }
                ];
                this.loadedCount = 0; this.complete = false;
            }
            loadAll(onComplete) {
                if (this.toLoad.length === 0) { onComplete(); return; }
                this.toLoad.forEach(item => {
                    const img = new Image(); img.src = item.src;
                    img.onload = () => { this.assets[item.name] = img; this.checkComplete(onComplete); };
                    img.onerror = () => { log(`Yüklenemedi: ${item.src}`); this.assets[item.name] = null; this.checkComplete(onComplete); };
                });
            }
            checkComplete(onComplete) {
                if (this.complete) return;
                this.loadedCount++;
                const progress = (this.loadedCount / this.toLoad.length) * 100;
                const fill = document.getElementById('loading-fill'); if(fill) fill.style.width = `${progress}%`;
                if (this.loadedCount === this.toLoad.length) {
                    this.complete = true; setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; onComplete(); }, 200);
                }
            }
            get(name) { return this.assets[name]; }
        }

        class InputHandler {
            constructor(canvas, camera) {
                this.canvas = canvas; this.camera = camera; this.active = false; this.targetPos = { x: 0, y: 0 };
                const start = (x, y) => { this.active = true; this.updateTarget(x, y); document.body.classList.add('clicking'); };
                const move = (x, y) => { if (this.active) this.updateTarget(x, y); };
                const end = () => { this.active = false; document.body.classList.remove('clicking'); };
                window.addEventListener('mousedown', (e) => { if(e.target === this.canvas) start(e.clientX, e.clientY); });
                window.addEventListener('mousemove', (e) => move(e.clientX, e.clientY));
                window.addEventListener('mouseup', end);
                window.addEventListener('touchstart', (e) => { if(e.target === this.canvas) start(e.touches[0].clientX, e.touches[0].clientY); }, {passive: false});
                window.addEventListener('touchmove', (e) => { if(this.active) e.preventDefault(); move(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
                window.addEventListener('touchend', end);
            }
            updateTarget(sx, sy) { this.targetPos.x = sx + this.camera.x; this.targetPos.y = sy + this.camera.y; }
            getInputVector(px, py) {
                if (!this.active) return { x: 0, y: 0 };
                const dx = this.targetPos.x - px; const dy = this.targetPos.y - py;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 10) return { x: 0, y: 0 };
                return { x: dx / dist, y: dy / dist };
            }
        }

        class Camera {
            constructor(w, h) { this.x = 0; this.y = 0; this.width = w; this.height = h; }
            follow(target, ww, wh) {
                let tx = target.x - this.width / 2; let ty = target.y - this.height / 2;
                tx = Math.max(0, Math.min(tx, ww - this.width)); ty = Math.max(0, Math.min(ty, wh - this.height));
                this.x += (tx - this.x) * 0.1; this.y += (ty - this.y) * 0.1;
            }
        }

        class Particle {
            constructor(x, y, type = 'dust') {
                this.x = x; this.y = y; this.type = type;
                this.life = 1.0; 
                if (type === 'dust') {
                    this.x += (Math.random() - 0.5) * 20; this.y += (Math.random() - 0.5) * 10;
                    this.vx = (Math.random() - 0.5) * 30; this.vy = (Math.random() - 1) * 30;
                    this.size = Math.random() * 6 + 4;
                    this.color = `rgba(200, 190, 170, ${this.life * 0.6})`;
                } else {
                    // Sparks
                    this.vx = (Math.random() - 0.5) * 300; this.vy = (Math.random() - 0.5) * 300;
                    this.size = Math.random() * 8 + 4;
                    const colors = ['#FFD700', '#FF4444', '#44FF44', '#4444FF', '#FF00FF'];
                    this.color = colors[Math.floor(Math.random()*colors.length)];

        class Entity {
            constructor(x, y, w, h, asset) {
                this.x = x; this.y = y; this.width = w; this.height = h; this.assetName = asset;
                this.markedForDeletion = false; this.z = 0; this.facingLeft = false;
                this.speechBubble = null; this.speechTimer = 0;
                this.lastX = x; this.lastY = y; this.dustTimer = 0;
                this.celebrationTarget = null;
                this.willTalk = false; // For celebration
            }
            trackDust(particles, dt) {
                const dist = Math.sqrt((this.x - this.lastX)**2 + (this.y - this.lastY)**2);
                if (dist > 1) {
                    this.dustTimer -= dt;
                    if (this.dustTimer <= 0) { particles.push(new Particle(this.x, this.y + this.height/4, 'dust')); this.dustTimer = 0.1 + Math.random() * 0.1; }
                }
                this.lastX = this.x; this.lastY = this.y;
            }
            draw(ctx, assets, cam) {
                const sx = this.x - cam.x; const sy = this.y - cam.y - this.z;
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.beginPath(); 
                if (this.assetName === 'vehicle' || this.assetName.startsWith('intruder')) ctx.ellipse(sx, sy + 10 + this.z, this.width / 2, this.height / 6, 0, 0, Math.PI * 2); 
                else ctx.ellipse(sx, sy + this.z, this.width / 2, this.height / 4, 0, 0, Math.PI * 2); 
                ctx.fill();
                ctx.save(); ctx.translate(sx, sy);
                if (this.facingLeft && !this.assetName.startsWith('boss')) ctx.scale(-1, 1);
                const img = assets.get(this.assetName);
                if (img && img.width > 0) {
                    if (this.isBossDog) ctx.filter = 'sepia(1) saturate(4) hue-rotate(-50deg)';
                    ctx.drawImage(img, -this.width / 2, -this.height, this.width, this.height);
                    ctx.filter = 'none';
                } else { 
                    if (this.assetName.includes('player')) ctx.fillStyle = 'blue';
                    else if (this.assetName.includes('vehicle')) ctx.fillStyle = '#555';
                    else if (this.assetName.startsWith('intruder')) ctx.fillStyle = '#800'; 
                    else if (this.assetName.includes('boss')) ctx.fillStyle = 'purple';
                    else if (this.assetName.includes('dog')) ctx.fillStyle = 'orange';
                    else if (this.assetName.includes('activist')) ctx.fillStyle = 'red';
                    else if (this.assetName.includes('vali')) ctx.fillStyle = 'cyan';
                    else ctx.fillStyle = 'green';
                    ctx.fillRect(-this.width/2, -this.height, this.width, this.height);
                }
                ctx.restore();
                if (this.speechBubble) this.drawBubble(ctx, sx, sy);
            }
            // ROUND RECT REPLACEMENT FOR COMPATIBILITY
            drawBubble(ctx, x, y) {
                const by = y - this.height - 20;
                ctx.save(); ctx.font = '21px Arial'; ctx.textAlign = 'center';
                const padding = 15; const tw = ctx.measureText(this.speechBubble).width;
                const bw = tw + padding * 2; const bh = 45;
                ctx.fillStyle = 'white'; ctx.strokeStyle = '#333'; ctx.lineWidth = 3;
                
                ctx.beginPath();
                const r = 15; const lx = x - bw / 2; const ly = by - bh;
                ctx.moveTo(lx + r, ly);
                ctx.lineTo(lx + bw - r, ly);
                ctx.quadraticCurveTo(lx + bw, ly, lx + bw, ly + r);
                ctx.lineTo(lx + bw, ly + bh - r);
                ctx.quadraticCurveTo(lx + bw, ly + bh, lx + bw - r, ly + bh);
                ctx.lineTo(lx + r, ly + bh);
                ctx.quadraticCurveTo(lx, ly + bh, lx, ly + bh - r);
                ctx.lineTo(lx, ly + r);
                ctx.quadraticCurveTo(lx, ly, lx + r, ly);
                ctx.closePath();
                ctx.fill(); ctx.stroke();

                ctx.beginPath(); ctx.moveTo(x - 15, by); ctx.lineTo(x, by + 15); ctx.lineTo(x + 15, by); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#333'; ctx.fillText(this.speechBubble, x, by - bh / 2 + 8); ctx.restore();
            }
            distanceTo(other) { const dx = this.x - other.x; const dy = this.y - other.y; return Math.sqrt(dx * dx + dy * dy); }
            showSpeechBubble(text, dur = 2) { this.speechBubble = text; this.speechTimer = dur; }
            updateSpeech(dt) { if (this.speechBubble) { this.speechTimer -= dt; if (this.speechTimer <= 0) this.speechBubble = null; } }
            
            moveToTarget(dt, speed = 100) {
                if (!this.celebrationTarget) return false;
                const dx = this.celebrationTarget.x - this.x;
                const dy = this.celebrationTarget.y - this.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) {
                    this.x += (dx/dist) * speed * dt;

                } else {
                    this.x = this.celebrationTarget.x;
                    this.y = this.celebrationTarget.y;
                    this.z = 0;
                    return true;
                }
            }
        }

            saveGame() { const data = { money: this.player.money, spdUp: this.spdUp, capUp: this.capUp, clnUp: this.clnUp, hlpUp: this.hlpUp, polUp: this.police.length }; localStorage.setItem('kocaeli_save', JSON.stringify(data)); }
            loadGame() { const saved = localStorage.getItem('kocaeli_save'); if (saved) { const data = JSON.parse(saved); this.player.money = data.money || 0; this.spdUp = data.spdUp || 0; this.capUp = data.capUp || 0; this.clnUp = data.clnUp || 0; this.hlpUp = data.hlpUp || 0; const polCount = data.polUp || 0; for(let i=0; i<this.spdUp; i++) { this.player.speed += 50; CONFIG.UPGRADE_COST_SPEED = Math.floor(CONFIG.UPGRADE_COST_SPEED * 1.5); } for(let i=0; i<this.capUp; i++) { this.player.maxCapacity++; CONFIG.UPGRADE_COST_CAPACITY = Math.floor(CONFIG.UPGRADE_COST_CAPACITY * 1.5); } for(let i=0; i<this.clnUp; i++) { this.cleaners.push(new Cleaner(CONFIG.WORLD_WIDTH/2, CONFIG.WORLD_HEIGHT/2)); CONFIG.UPGRADE_COST_CLEANER = Math.floor(CONFIG.UPGRADE_COST_CLEANER * 1.5); } for(let i=0; i<this.hlpUp; i++) { this.helpers.push(new Helper(CONFIG.WORLD_WIDTH/2, CONFIG.WORLD_HEIGHT/2)); CONFIG.UPGRADE_COST_HELPER = Math.floor(CONFIG.UPGRADE_COST_HELPER * 1.5); CONFIG.DOG_SPAWN_INTERVAL *= 0.8; } for(let i=0; i<polCount; i++) { this.police.push(new Police(CONFIG.WORLD_WIDTH/2, CONFIG.WORLD_HEIGHT/2)); CONFIG.UPGRADE_COST_POLICE = Math.floor(CONFIG.UPGRADE_COST_POLICE * 1.5); } } }
            spawnActivist(t) { let x,y,d; do { x=Math.random()*CONFIG.WORLD_WIDTH; y=Math.random()*CONFIG.WORLD_HEIGHT; const dx=x-CONFIG.WORLD_WIDTH/2; const dy=y-CONFIG.WORLD_HEIGHT/2; d=Math.sqrt(dx*dx+dy*dy); } while(d<CONFIG.SAFE_ZONE_RADIUS || (x<CONFIG.BUILDING_BOUNDS.w && y<CONFIG.BUILDING_BOUNDS.h)); this.activists.push(new Activist(x,y,t)); }
            spawnA3() { const a=Math.random()*Math.PI*2; this.a3List.push(new Activist3(CONFIG.WORLD_WIDTH/2+Math.cos(a)*800, CONFIG.WORLD_HEIGHT/2+Math.sin(a)*800, this.van)); }
            spawnBoss(dropCount) { const a=Math.random()*Math.PI*2; this.bossList.push(new Boss(CONFIG.WORLD_WIDTH/2+Math.cos(a)*800, CONFIG.WORLD_HEIGHT/2+Math.sin(a)*800, dropCount)); const alertBox = document.getElementById('boss-alert'); if(alertBox) { alertBox.innerText = `Patron Geliyor !!! ${this.bossWave}. Dalga`; alertBox.style.display = 'block'; setTimeout(() => alertBox.style.display = 'none', 4000); } }
            spawnIntruder() { this.intruderList.push(new IntruderVehicle()); const alertBox = document.getElementById('boss-alert'); if(alertBox) { alertBox.innerText = "Komşu İlçe Aracı Geldi!"; alertBox.style.display = 'block'; setTimeout(() => alertBox.style.display = 'none', 4000); } }
            spawnVali() { this.valiList.push(new Vali()); this.valiActive = true; }
            
            triggerGameOver() { 
                this.gameOver = true; 
                // Stop music and play game over sound (optional, but loop logic needs stop)
                this.soundManager.playLoop('bosswave1_1'); 

                const el = document.getElementById('game-screen-overlay'); // Use common overlay
                if(el) { 
                    el.style.display = 'flex'; 
                    el.style.background = 'rgba(180, 0, 0, 0.8)'; // DARK RED
                    document.getElementById('overlay-title').innerHTML = "Kuduz Salgını Başladı<br>Oyunu Kaybettiniz!";
                }
            }
            triggerWin() { 
                this.gameOver = true; 
                // Keep Vali music playing (handled in loop)

                const el = document.getElementById('game-screen-overlay'); // Use common overlay
                if(el) { 
                    el.style.display = 'flex'; 
                    el.style.background = 'rgba(0, 180, 0, 0.8)'; // DARK GREEN
                    document.getElementById('overlay-title').innerHTML = "Tebrikler<br>Kocaeli Halkını Kurtardınız !!!";
                }
            }

            startPandemic() { this.pandemicActive = true; if (this.bossWave === 1) this.pandemicTimer = 60; else if (this.bossWave === 2) this.pandemicTimer = 45; else if (this.bossWave === 3) this.pandemicTimer = 30; document.getElementById('pandemic-hud').style.display = 'block'; }
            spawnDog(x,y) { if(this.valiActive) { const bad = this.activists.filter(a => a.type===2); if(bad.length===0) return; } if(this.dogs.length>=CONFIG.MAX_DOGS) return; if(!x) { do { x=Math.random()*CONFIG.WORLD_WIDTH; y=Math.random()*CONFIG.WORLD_HEIGHT; const dx=x-CONFIG.WORLD_WIDTH/2; const dy=y-CONFIG.WORLD_HEIGHT/2; if(Math.sqrt(dx*dx+dy*dy)<CONFIG.SAFE_ZONE_RADIUS || (x<CONFIG.BUILDING_BOUNDS.w && y<CONFIG.BUILDING_BOUNDS.h)) x=null; } while(!x); } this.dogs.push(new Dog(x,y)); }
            spawnCiv() { let x,y; do { x=Math.random()*CONFIG.WORLD_WIDTH; y=Math.random()*CONFIG.WORLD_HEIGHT; } while(x<CONFIG.BUILDING_BOUNDS.w && y<CONFIG.BUILDING_BOUNDS.h); this.civs.push(new Civilian(x,y)); }

            startCelebration() {
                this.celebrationActive = true;
                this.dogs = []; this.activists = []; this.food = [];
                
                // CLEAR OLD BUBBLES
                this.player.speechBubble = null;
                if(this.valiList.length > 0) this.valiList[0].speechBubble = null;

                const cx = CONFIG.WORLD_WIDTH / 2; const cy = CONFIG.WORLD_HEIGHT / 2; const vanY = this.van.y;
                const civY = vanY + 150;
                this.civs.forEach((c, i) => {
                    c.celebrationTarget = { x: cx + (i - this.civs.length/2) * 80, y: civY };
                    if(c.assetName.includes('patient1')) c.happyAsset = 'Pation1happy1';
                    else if(c.assetName.includes('patient2')) c.happyAsset = 'Pation2happy1';
                    else c.happyAsset = 'Pation3happy1';
                    c.idleAsset = c.happyAsset.replace('1','2');
                    c.willTalk = Math.random() < 0.5; // 50% Chance to talk
                });
                const staffY = civY + 120;
                const staff = [...this.police, ...this.cleaners, ...this.helpers];
                staff.forEach((s, i) => {
                    s.celebrationTarget = { x: cx + (i - staff.length/2) * 90, y: staffY };
                    if(s.assetName === 'police') s.happyAsset = 'policehappy';
                    else if(s.assetName === 'cleaner') s.happyAsset = 'cleanerhappy';
                    else if(s.assetName === 'helper') { s.happyAsset = 'helperhappy1'; s.idleAsset = 'helperhappy2'; }
                    s.willTalk = Math.random() < 0.5; // 50% Chance to talk
                });
                const heroY = staffY + 120;
                if(this.valiList.length > 0) {
                    this.valiList[0].celebrationTarget = { x: cx - 60, y: heroY };
                    this.valiList[0].happyAsset = 'vali1'; this.valiList[0].idleAsset = 'valihappy';
                }
                this.player.celebrationTarget = { x: cx + 60, y: heroY };
                this.player.happyAsset = 'playerhappy1'; this.player.idleAsset = 'playerhappy2';
            }

            loop(t) {
                try {
                    if (this.gameOver) return;
                    const dt = Math.min((t - this.lastTime) / 1000, 0.1); this.lastTime = t;

                    if (this.celebrationActive) {
                        this.camera.follow({x:CONFIG.WORLD_WIDTH/2, y:CONFIG.WORLD_HEIGHT/2}, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT);
                        
                        // Use a single loop to update speech for everyone
                        const celebrationEntities = [...this.civs, ...this.police, ...this.cleaners, ...this.helpers, ...this.valiList, this.player];
                        
                        celebrationEntities.forEach(e => {
                            e.updateSpeech(dt); // IMPORTANT: Tick timer so bubble expires

                            if(e.celebrationTarget) {
                                const arrived = e.moveToTarget(dt);
                                if(arrived) {
                                    e.assetName = e.idleAsset || e.happyAsset; 
                                    
                                    // GUARANTEED SPEECH FOR HEROES
                                    if (e instanceof Vali && !e.speechBubble) e.showSpeechBubble("🏅", 5);
                                    else if (e instanceof Player && !e.speechBubble) e.showSpeechBubble("Çalışınca oluyor", 5);

                                    // RANDOM REPEATING SPEECH FOR OTHERS
                                    else if(e.willTalk && !e.speechBubble) {
                                        if(e instanceof Civilian) e.showSpeechBubble(["Helal olsun !!!", "😊", "❤️", "🤗🤗", "Teşekkürler !!!", "Oh bee !!!", "🥳🥳🎉", "Allah razı olsun"][Math.floor(Math.random()*8)], 2);
                                        else if(e instanceof Police || e instanceof Cleaner || e instanceof Helper) e.showSpeechBubble(["İşimiz", "Eyvallah", "🙏"][Math.floor(Math.random()*3)], 2);
                                    }
                                } else { e.assetName = e.happyAsset; }
                            }
                        });
                        if(Math.random() < 0.3) this.particles.push(new Particle(CONFIG.WORLD_WIDTH/2 + (Math.random()-0.5)*800, CONFIG.WORLD_HEIGHT/2 + (Math.random()-0.5)*600, 'spark'));
                        this.celebrationTimer -= dt;
                        if(this.celebrationTimer <= 0) this.triggerWin();

                    } else {
                        this.spawnT += dt * 1000; if (this.spawnT > CONFIG.DOG_SPAWN_INTERVAL) { this.spawnDog(); this.spawnT = 0; }
                        if (this.capUp >= 2) { this.a3T -= dt; if (this.a3T <= 0 && !this.valiActive) { this.spawnA3(); this.a3T = 10 + Math.random() * 10; } }
                        this.totalTime += dt;
                        if (this.totalTime >= 300 && this.intruderWave < 1) {
                            this.spawnIntruder();
                            this.intruderWave = 1;
                            this.soundManager.playMusicSequence('intruder_vehiclewave1_1', 'intruder_vehiclewave1_2');
                        }
                        if (this.totalTime >= 600 && this.intruderWave < 2) {
                            this.spawnIntruder();
                            this.intruderWave = 2;
                            this.soundManager.playMusicSequence('intruder_vehiclewave2_1', 'intruder_vehiclewave2_2');
                        }

                        // BOSS WAVES (Time based)
                        // Wave 1: 14 mins (840s)
                        if (this.bossWave < 1) {
                            if (this.totalTime >= 830 && !this.civsSpawnedForWave) {
                                for(let i=0; i<10; i++) this.spawnCiv();
                                const alertBox = document.getElementById('boss-alert');
                                if(alertBox) { alertBox.innerText = "Kargaşa"; alertBox.style.display = 'block'; setTimeout(() => alertBox.style.display = 'none', 3000); }
                                this.civsSpawnedForWave = true;
                            }
                            if (this.totalTime >= 840) {
                                this.bossWave = 1;
                                this.spawnBoss(CONFIG.BOSS_DROPS_BASE);
                                this.bossActive = true;
                                this.civsSpawnedForWave = false;
                                this.soundManager.playMusicSequence('bosswave1_1', 'bosswave1_2');
                            }
                        }
                        // Wave 2: 17 mins (1020s)
                        else if (this.bossWave < 2) {
                            if (this.totalTime >= 1010 && !this.civsSpawnedForWave) {
                                for(let i=0; i<10; i++) this.spawnCiv();
                                const alertBox = document.getElementById('boss-alert');
                                if(alertBox) { alertBox.innerText = "Kargaşa"; alertBox.style.display = 'block'; setTimeout(() => alertBox.style.display = 'none', 3000); }
                                this.civsSpawnedForWave = true;
                            }
                            if (this.totalTime >= 1020) {
                                this.bossWave = 2;
                                this.spawnBoss(Math.floor(CONFIG.BOSS_DROPS_BASE * 1.5));
                                this.bossActive = true;
                                this.civsSpawnedForWave = false;
                                this.soundManager.playMusicSequence('bosswave2_1', 'bosswave2_2');
                            }
                        }
                        // Wave 3: 23 mins (1380s)
                        else if (this.bossWave < 3) {
                            if (this.totalTime >= 1370 && !this.civsSpawnedForWave) {
                                for(let i=0; i<10; i++) this.spawnCiv();
                                const alertBox = document.getElementById('boss-alert');
                                if(alertBox) { alertBox.innerText = "Kargaşa"; alertBox.style.display = 'block'; setTimeout(() => alertBox.style.display = 'none', 3000); }
                                this.civsSpawnedForWave = true;
                            }
                            if (this.totalTime >= 1380) {
                                this.bossWave = 3;
                                this.spawnBoss(Math.floor(CONFIG.BOSS_DROPS_BASE * 2.25));
                                this.bossActive = true;
                                this.civsSpawnedForWave = false;
                                this.soundManager.playMusicSequence('bosswave3_1', 'vali');
                            }
                        }
                        
                        if (this.bossActive && this.bossList.length === 0) { this.bossActive = false; this.startPandemic(); }

                        if (this.pandemicActive) {
                            this.pandemicTimer -= dt;
                            const bossDogCount = this.dogs.filter(d => d.isBossDog && !d.isCollected).length;
                            const bossFoodCount = this.bossFood.length;
                            const hud = document.getElementById('pandemic-hud');
                            
                            // Update Text ONLY if HUD is visible (game running)
                            if (hud && hud.style.display !== 'none') {
                                 hud.innerHTML = `SALGIN TEHLİKESİ<br>Süre: ${Math.ceil(this.pandemicTimer)}s | Patron Köpek: ${bossDogCount + bossFoodCount}`;
                            }

                            if (this.pandemicTimer <= 0) {
                                this.triggerGameOver();
                                return;
                            }
                            if (bossDogCount === 0 && bossFoodCount === 0) {
                                this.pandemicActive = false; if(hud) hud.style.display = 'none';
                                if (this.bossWave === 3) { this.wave3Cleared = true; this.valiTimer = 0; }
                            }
                        }

                        if (this.wave3Cleared && !this.valiActive) {
                            this.valiTimer += dt;
                            if (this.valiTimer > 3 && !this.valiAlertShown) {
                                const alertBox = document.getElementById('boss-alert'); alertBox.innerText = "The Vali Geliyor"; alertBox.style.display = 'block'; setTimeout(() => alertBox.style.display = 'none', 3000); this.valiAlertShown = true;
                            }
                            if (this.valiTimer > 6) this.spawnVali();
                        }

                        if (this.valiActive) {
                             const badActivists = this.activists.filter(a => a.type === 2);
                             if (badActivists.length === 0 && !this.celebrationActive) { this.startCelebration(); }
                        }

                        const vec = this.input.getInputVector(this.player.x, this.player.y);
                        this.player.update(dt, vec, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT);
                        this.camera.follow(this.player, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT);
                        
                        this.activists.forEach(a => { if(a.update(dt, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT) === 'drop_food') this.food.push(new DogFood(a.x, a.y)); });
                        for(let i = this.a3List.length - 1; i >= 0; i--) { const a = this.a3List[i]; if(a.update(dt, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT) === 'release_dog') { this.spawnDog(this.van.x+(Math.random()-0.5)*50, this.van.y+(Math.random()-0.5)*50); this.player.money = Math.max(0, this.player.money-10); } if(a.markedForDeletion) this.a3List.splice(i, 1); }
                        this.bossList.forEach(b => { const action = b.update(dt, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT); if (action === 'drop_boss_food') { this.bossFood.push(new BossFood(b.x + (Math.random()-0.5)*200, b.y + (Math.random()-0.5)*200)); } }); this.bossList = this.bossList.filter(b => !b.markedForDeletion);
                        this.bossFood.forEach(bf => { const action = bf.update(dt); if (action === 'spawn_boss_dog') { this.dogs.push(new BossDog(bf.x, bf.y)); } }); this.bossFood = this.bossFood.filter(bf => !bf.markedForDeletion);
                        for(let i = this.intruderList.length - 1; i >= 0; i--) { const intruder = this.intruderList[i]; if(intruder.update(dt, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT) === 'spawn_dog') { this.dogs.push(new Dog(intruder.x, intruder.y)); } if(intruder.markedForDeletion) this.intruderList.splice(i, 1); }
                        for(let i = this.valiList.length - 1; i >= 0; i--) { this.valiList[i].update(dt, this.activists, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT); }
                        this.activists = this.activists.filter(a => !a.markedForDeletion);
                        this.dogs.forEach(d => { if(d.update(dt, this.food, this.civs, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT) === 'multiply') this.spawnDog(d.x+10, d.y+10); });
                        this.civs.forEach(c => { if(c.update(dt, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT, this.dogs) === 'died') { this.player.money = Math.max(0, this.player.money-10); setTimeout(()=>this.spawnCiv(), 5000); } }); this.civs = this.civs.filter(c => !c.markedForDeletion);
                        this.cleaners.forEach(c => c.update(dt, this.food, this.bossFood));
                        this.helpers.forEach(h => { if(h.update(dt, this.dogs, this.van, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT) === 'deposit') { this.player.money += 10; this.saveGame(); } });
                        this.police.forEach(p => p.update(dt, this.a3List, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT));
                        this.food = this.food.filter(f => !f.markedForDeletion);
                        this.dogs.forEach(d => { if(!d.isCollected && this.player.distanceTo(d)<60) this.player.addToStack(d); });
                        this.dogs = this.dogs.filter(d => !d.isCollected);
                        if(!this.player.isStunned) this.activists.forEach(a => { if(a.type===1 && this.player.distanceTo(a)<50) { const d=this.player.stun(); a.triggerSpeech(); if(d) this.dogs.push(d); } });
                        this.a3List.forEach(a => { if(this.player.distanceTo(a)<60 && a.state !== 'flee' && a.state !== 'arrested') { a.state='flee'; const m=["Abla bi git ya !!!","Abla senin evin yok mu ya !!!","Allah'ım sana geliyorum !!!"]; this.player.showSpeechBubble(m[Math.floor(Math.random()*m.length)]); } });
                        this.food.forEach(f => { if(this.player.distanceTo(f)<50) f.markedForDeletion=true; });
                        let capDisplay = this.player.stack.length; if (this.player.stack.some(d => d.isBossDog)) capDisplay = this.player.maxCapacity; this.uiCap.innerText = `${capDisplay}/${this.player.maxCapacity}`;
                        const distToVan = Math.sqrt(Math.pow(this.player.x - this.van.x, 2) + Math.pow(this.player.y - (this.van.y - 120), 2));
                        if(distToVan < 150 && this.player.stack.length > 0) { this.depT+=dt*1000; if(this.depT>CONFIG.DEPOSIT_RATE) { if(this.player.removeFromStack()) { this.player.money+=10; this.saveGame(); } this.depT=0; } }
                        this.uiMoney.innerText = this.player.money;
                    }

                    this.ctx.fillStyle = '#333'; this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                    const bg = this.assets.get('background'); this.ctx.save(); this.ctx.translate(-this.camera.x, -this.camera.y);
                    if(bg) this.ctx.drawImage(bg, 0, 0, CONFIG.WORLD_WIDTH, CONFIG.WORLD_HEIGHT);
                    else { this.ctx.strokeStyle='#444'; this.ctx.lineWidth=2; for(let x=Math.floor(this.camera.x/100)*100; x<this.camera.x+this.canvas.width; x+=100) { this.ctx.beginPath(); this.ctx.moveTo(x, this.camera.y); this.ctx.lineTo(x, this.camera.y+this.canvas.height); this.ctx.stroke(); } for(let y=Math.floor(this.camera.y/100)*100; y<this.camera.y+this.canvas.height; y+=100) { this.ctx.beginPath(); this.ctx.moveTo(this.camera.x, y); this.ctx.lineTo(this.camera.x+this.canvas.width, y); this.ctx.stroke(); } }
                    this.ctx.restore(); this.ctx.save(); this.ctx.translate(CONFIG.WORLD_WIDTH/2-this.camera.x, CONFIG.WORLD_HEIGHT/2-this.camera.y); this.ctx.fillStyle = 'rgba(100, 200, 100, 0.3)'; this.ctx.beginPath(); this.ctx.arc(0, 0, CONFIG.SAFE_ZONE_RADIUS, 0, Math.PI*2); this.ctx.fill(); this.ctx.restore();
                    
                    const all = [ this.player, this.van, ...this.dogs, ...this.activists, ...this.a3List, ...this.food, ...this.civs, ...this.cleaners, ...this.helpers, ...this.police, ...this.bossList, ...this.bossFood, ...this.intruderList, ...this.valiList ];
                    all.sort((a,b)=>a.y-b.y);
                    this.particles.forEach(p => { p.update(dt); p.draw(this.ctx, this.camera); });
                    for (let i = this.particles.length - 1; i >= 0; i--) { if (this.particles[i].life <= 0) this.particles.splice(i, 1); }
                    all.forEach(e => { if (e instanceof Dog) e.trackDust(this.particles, dt); e.draw(this.ctx, this.assets, this.camera); });
                    if(this.input.active && !this.celebrationActive) { const px=this.player.x-this.camera.x; const py=this.player.y-this.camera.y; const tx=this.input.targetPos.x-this.camera.x; const ty=this.input.targetPos.y-this.camera.y; this.ctx.strokeStyle='rgba(255,255,255,0.5)'; this.ctx.lineWidth=2; this.ctx.beginPath(); this.ctx.moveTo(px,py); this.ctx.lineTo(tx,ty); this.ctx.stroke(); this.ctx.fillStyle='rgba(255,255,255,0.5)'; this.ctx.beginPath(); this.ctx.arc(tx,ty,10,0,Math.PI*2); this.ctx.fill(); }
                    requestAnimationFrame((t)=>this.loop(t));
                } catch(e) { console.error(e); showError(e.message); requestAnimationFrame((t)=>this.loop(t)); }
            }
        }
        try { window.onload = () => new Game(); } catch(e) { showError(e.message); }
    </script>
</body>
</html>
